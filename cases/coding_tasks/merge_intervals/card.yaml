expected: merge_intervals([[2,6],[1,3]])==[[1,6]]（乱序也要合对）、([[1,3],[2,6],[8,10]])==[[1,6],[8,10]]、([])==[]。golden
  先 sorted(key=start) 再单趟 sweep。
