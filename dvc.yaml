# DVC pipeline: NACA0012 geometry + mesh generation
#
# Usage:
#   dvc repro              # regenerate all stages
#   dvc repro <stage>      # regenerate a single stage
#   dvc push               # push outputs to remote (configured in .dvc/config)
#   dvc pull               # pull from remote

stages:
  generate_naca0012_geometry:
    # wdir defaults to the directory containing this dvc.yaml (repo root).
    # The script writes outputs next to itself (Path(__file__).parent /
    # "geometry"), so cmd/deps/outs are all repo-root relative.
    cmd: python cases/validation/naca0012/gen_geometry.py
    deps:
      - cases/validation/naca0012/gen_geometry.py
    outs:
      - cases/validation/naca0012/geometry/naca0012.dat
      - cases/validation/naca0012/geometry/naca0012.stl
