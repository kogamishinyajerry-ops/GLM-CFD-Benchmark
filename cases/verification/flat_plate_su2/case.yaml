id: flat_plate_su2
name: Flat Plate (SU2 Verification)
category: verification
description: "Flat plate laminar boundary layer verification case for SU2 solver. Reference: Blasius analytical solution."
physics:
  flow: incompressible
  turbulence: none
  dimensionality: 2d
  steady: true
conditions:
  # Re_L=2e5: the ONLY value consistent with both the reference data and the
  # physics. blasius_cf.csv matches Cf=0.664/sqrt(Re_L*x/L) at Re_L=2e5 (0.36%
  # max err; 55% at the old 1e6), and a laminar plate (turbulence: none) must
  # sit below transition (~5e5) — 1e6 would already be transitional/turbulent.
  reynolds: 200000.0
  mach: 0.3
  alpha_deg: 0.0
geometry:
  type: external
  source: null
mesh:
  family: structured_hex
  levels: ["single"]
  target_y_plus: 1.0
solvers:
  - name: su2
    command: "SU2_CFD {{ run_dir }}/case/{{ case_id }}.cfg"
    timeout_sec: null
    steps:
      - name: solve
        command: "SU2_CFD {{ run_dir }}/case/{{ case_id }}.cfg"
        timeout_sec: 600
        critical: true
    parameters:
      mach: 0.3
      reynolds: 200000.0  # matches conditions.reynolds (see note above)
      aoa: 0.0
outputs:
  fields: ["U", "p"]
  curves: []
  qoi:
    - skin_friction_coeff
reference:
  type: analytical
  files:
    blasius: reference/blasius_cf.csv
  qoi_values:
    # Blasius plate-average skin-friction coefficient C_F = 1.328/sqrt(Re_L) at
    # Re_L=2e5 = 0.002969 (this is the quantity the SU2 adapter extracts:
    # method="average" over the surface). The old 0.0026 was inconsistent with
    # its own analytical basis — a CORRECT laminar run (~0.00297) failed it at
    # 14.2% > the 10% tol, i.e. the verification case rejected correct solvers.
    skin_friction_coeff: 0.00297
metrics:
  qoi_relative_tolerance:
    skin_friction_coeff: 0.1
budget:
  max_runtime_sec: 900
  max_cells: null
