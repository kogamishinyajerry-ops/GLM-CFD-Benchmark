title: NACA0012 Airfoil α=5° (Ladson 1988)
capability: 复现 NACA0012 α=5°、Re=6×10⁶、M=0.3 的风洞实验气动力（OpenFOAM simpleFoam+SA，n_iter=3000；或 SU2 RANS-SA），命中中等迎角、附着流下的升/阻系数。考
  CFD 求解器的物理保真度。
expected: 管线跑通，cl≈0.456、cd≈0.0095（Ladson 1988 / NASA TM-4074 实测），各在 10% 相对容差带内。Cp 曲线应贴合 ladson1988_a5.csv（吸力峰
  x/c=0.025 处 Cp=-1.521）。是 α 扫描（0/5/10/15°）里唯一 runs/ 有真实执行记录的一档（3 次 OpenFOAM 跑）——但这 3 次都如实 FAIL（见「怎么咬中」）。
criteria: 无 agent-eval 契约，走 cfdb run → MetricsEngine。真正的门：cl、cd 各自 |computed−ref|/|ref| ≤ 0.10（10%），两个都在带内才
  qoi_pass；出 NaN/Inf 直接 fail、缺失判 incomplete。曲线门未配 curve_l2_tolerance 且 adapter 恒不产 curves，双重不参与判分；预算/max_cells
  声明但不咬人。
what_makes_it_bite: 「欠分辨网格如实 FAIL」在这里是**已发生的实测事实**，不是假设——3 次真实 OpenFOAM 跑（最新 20260712，656s 跑到 iter 3000、forceCoeffs
  真出了 coefficient.dat）算出 cl≈0.094、cd≈0.0575，对实测 cl=0.456 / cd=0.0095 分别偏 79% / 505%，两门都冲出 ±10% 带，overall_status=fail。流程完全正常
  （无报错、无 NaN、预算内、cl/cd 都提取到了），却因粗网格（唯一 coarse 档、target_y_plus=1.0 只是目标）没解好边界层而物理算错——对照 sha256 锚定的真实 NASA 数据无处遁形。
  （要让它 pass 需要真正的网格细化/y+ 收敛研究，非放松尺子。）
