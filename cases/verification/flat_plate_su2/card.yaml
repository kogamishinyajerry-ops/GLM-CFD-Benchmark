title: Flat Plate (SU2 Verification)
capability: 用 SU2 跑平板层流边界层 verification case，考求解器能否复现 Blasius 解析解的表面摩擦系数——无湍流模型的纯层流，对解析基准而非风洞实验做 code-verification。
expected: SU2_CFD 跑通，skin_friction_coeff≈0.00297，在 10% 相对容差内。参考=Blasius 平板平均摩阻 C_F=1.328/√(Re_L)
  在 Re_L=2×10⁵（也即 blasius_cf.csv 的 Cf=0.664/√(Re_x) 分布，sha256 锚定），正是 SU2 adapter method="average" 提取的量。
criteria: category=verification（对解析解），无 agent-eval 契约，走 cfdb run → MetricsEngine：skin_friction_coeff 相对误差
  |computed−0.00297|/0.00297 ≤ 0.10 才 qoi_pass；NaN/Inf→fail、缺失→incomplete。outputs.curves 为空、预算 900s 超时只警告不翻判定、max_cells=null。
what_makes_it_bite: 「验证案例本身反而拒绝正解」的坑——已修（2026-07-12）：原 case 声明 Re=1×10⁶ 但参考数据实为 Re=2×10⁵（0.36% 吻合），
  且 Re=1e6 对层流设定（turbulence=none）已过转捩（~5e5）；qoi 原锚 0.0026，一个**正确**层流解（Blasius 均值 0.00297）反而以 14.2%>10% 被判 FAIL。
  现 Re/qoi 均校正到 Blasius 自洽值（Re=2e5、C_F=0.00297），正确解可 PASS。诚实残差（已收窄）：本 case 迄今从未真跑过（runs/ 无记录），
  故「SU2 的 method=average 提取是否真落在 0.00297 附近」尚未经真跑实证——参考值是解析推导，非实测标定。
