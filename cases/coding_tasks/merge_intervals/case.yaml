id: merge_intervals
name: Merge Overlapping Intervals
category: verification
domain: coding
description: >-
  Manufactured algorithm task: merge_intervals() must be reimplemented from a
  single-pass sweep that assumes the input is already start-sorted (buggy:
  produces wrong intervals on unsorted input) to a correct implementation that
  sorts by start before sweeping. Mechanical correctness is judged purely by
  hidden tests. Exercises nested list[list[int]] I/O in the trusted-reexecution
  oracle. See Architecture-v5.0-multi-domain.md §3.4.
solvers:
  - name: generic
    command: "true"
outputs:
  qoi:
    - pass_rate
reference:
  type: manufactured
  qoi_values:
    pass_rate: 1.0
metrics:
  qoi_relative_tolerance:
    pass_rate: 0.0
budget:
  max_runtime_sec: 60
execution:
  requires_sandbox: true
  expected_test_count: 5
  # R9 rollout: trusted re-execution oracle. Held-out interval sets are disjoint
  # from the hidden-test inputs (verified by the admission disjointness lint), so
  # a submission cannot replay a harvested assertion — it must actually merge
  # interval sets it has never seen. The 'io_oracle_pass' gate is implied by this
  # declaration (auto-added at contract init).
  io_oracle:
    entry: "solution:merge_intervals"
    cases_file: "reference/held_out_io.json"
