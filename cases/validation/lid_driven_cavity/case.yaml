id: lid_driven_cavity
name: Lid-Driven Cavity (Re=100)
category: validation
description: "Classic lid-driven cavity benchmark, OpenFOAM icoFoam, laminar Re=100 (L=0.1 m, U_lid=1 m/s, nu=1e-3). Reference: Ghia, Ghia & Shin (1982), J. Comput. Phys. 48, Table I Re=100 column. QoI centerline_umax = max |U|/U_lid on the vertical centerline probe line (y/H up to 0.95): interpolated Ghia value 0.665 at y/H=0.95. Tolerance 10% reflects the coarse 32x32 demo mesh (documented domain decision, not a hidden fudge)."
physics:
  flow: incompressible
  turbulence: none
  dimensionality: 2d
  steady: false
conditions:
  reynolds: 100.0
geometry:
  type: internal
  source: null
mesh:
  family: structured_hex
  levels: ["single"]
  target_y_plus: null
solvers:
  - name: openfoam
    command: "icoFoam"
    timeout_sec: null
    steps:
      - name: block_mesh
        command: "blockMesh -case {{ run_dir }}/case"
        timeout_sec: 60
        critical: true
      - name: solve
        command: "icoFoam -case {{ run_dir }}/case"
        timeout_sec: 540
        critical: true
    parameters:
      nu: 0.001
      end_time: 5.0
      delta_t: 0.002
      write_interval: 500
outputs:
  fields: ["U", "p"]
  curves: []
  qoi:
    - centerline_umax
reference:
  type: dns
  files:
    centerline: reference/ghia1982_centerline.csv
  qoi_values:
    centerline_umax: 0.665
  # v5.0 Wave D2 pilot: held-out reference wires the agent-eval scoring path
  # to a copy of the reference kept out of the public case surface. Lives
  # under held_out/ (not reference/) so it stays out of the reference/
  # directory the provenance audit's stray-file scan treats as the public
  # declared-reference tree; it is still frozen and anchored, only via the
  # agentbench scoring contract's held_out: key namespace, not provenance.yaml.
  # As of this pilot the held-out value is deliberately the SAME as the
  # public qoi_values above (copied from Ghia et al. 1982) — this proves the
  # mechanism (frozen anchoring + scoring-time redirection), it does NOT yet
  # add anti-copy value from an independently recomputed number. That residual
  # (a genuinely independent held-out digitization/rerun) is explicitly not
  # solved here; see Architecture v5.0 §5.2 and §8.
  held_out_files:
    qoi: held_out/qoi.json
metrics:
  qoi_relative_tolerance:
    centerline_umax: 0.10
budget:
  max_runtime_sec: 600
  max_cells: null
