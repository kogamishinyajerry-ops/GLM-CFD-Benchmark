id: naca0012_a0
name: NACA0012 Airfoil α=0° (Ladson 1988 Validation)
category: validation
description: >
  Classic external aerodynamics validation case. NACA0012 symmetric airfoil at
  angle of attack α=0°, Re=6e6, M=0.3 (low Mach, RANS). OpenFOAM (simpleFoam +
  SA turbulence) and SU2 (RANS-SA) solvers compared against Ladson 1988
  experimental Cp distribution (NASA TM-4074).
physics:
  flow: rans
  turbulence: rans_sa
  dimensionality: 2d
  steady: true
conditions:
  reynolds: 6.0e6
  mach: 0.3
  alpha_deg: 0.0
geometry:
  type: external
  source: geometry/naca0012.dat
mesh:
  family: unstructured_hex
  levels: ["coarse"]
  target_y_plus: 1.0
solvers:
  - name: openfoam
    command: ""
    timeout_sec: 600
    steps:
      - name: block_mesh
        command: "blockMesh -case {{ case_dir }}"
        timeout_sec: 60
        critical: true
      - name: snappy_mesh
        command: "snappyHexMesh -overwrite -case {{ case_dir }}"
        timeout_sec: 300
        critical: true
      - name: solve
        command: "simpleFoam -case {{ case_dir }}"
        timeout_sec: 600
        critical: true
    parameters:
      # nu chosen for Re = U*L/nu = 100*1/1.6667e-5 ≈ 6.0e6, matching Ladson
      # 1988 (NASA TM-4074) experimental conditions for NACA0012 validation.
      # n_iter=2000 gives SIMPLE enough iterations for SA turbulence field to
      # converge with the tightened fvSolution tolerance (p 1e-8 / relTol 0.01);
      # 200 was insufficient (smoke-only, SA never reached plateau).
      nu: 1.6667e-5
      u_inf: 100.0
      l_ref: 1.0
      alpha_deg: 0.0
      n_iter: 2000
  - name: su2
    command: ""
    timeout_sec: 600
    steps:
      - name: solve
        command: "SU2_CFD {{ case_dir }}/{{ case_id }}.cfg"
        timeout_sec: 600
        critical: true
    parameters:
      mach: 0.3
      aoa_deg: 0.0
      reynolds: 6.0e6
outputs:
  fields: ["U", "p", "nuTilda"]
  curves: ["cp_distribution"]
  qoi:
    - cl
    - cd
reference:
  type: experimental
  files:
    cp_distribution: reference/ladson1988.csv
  qoi_values:
    cl: 0.0
    cd: 0.0086
metrics:
  qoi_relative_tolerance:
    cl: 0.001
    cd: 0.10
  # P4-G: cl reference is exactly 0 (symmetric airfoil, alpha=0), so the
  # relative tolerance above can never fire; gate cl with |computed - 0|.
  qoi_absolute_tolerance:
    cl: 0.01
  curve_l2_tolerance:
    cp_distribution: 0.05
budget:
  max_runtime_sec: 600
  max_cells: 500000
